<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Planejamento FT — Redefinir Senha</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <style>
    body {
      background: linear-gradient(135deg, #1e3a5f 0%, #0f2040 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .logo-icon {
      width: 60px; height: 60px;
      background: linear-gradient(135deg, #1e3a5f, #2d6a9f);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1rem;
    }
    .logo-icon i { color: #fff; font-size: 1.8rem; }
    .btn-primary-custom {
      background: #1e3a5f; border: none; border-radius: 8px;
      padding: .75rem; font-weight: 600; letter-spacing: .5px; transition: background .2s;
    }
    .btn-primary-custom:hover { background: #2d6a9f; }
    .form-control:focus {
      border-color: #1e3a5f;
      box-shadow: 0 0 0 .2rem rgba(30,58,95,.2);
    }
    .alert { border-radius: 8px; font-size: .9rem; }
    .password-strength { height: 4px; border-radius: 2px; transition: all .3s; margin-top: .35rem; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-icon"><i class="bi bi-shield-lock"></i></div>
    <h4 class="text-center fw-bold mb-1" style="color:#1e3a5f">Nova Senha</h4>
    <p class="text-center text-muted mb-4" style="font-size:.875rem">Defina uma nova senha para sua conta</p>

    <div id="alertBox" class="alert d-none" role="alert"></div>

    <form id="resetForm">
      <div class="mb-3">
        <label class="form-label fw-semibold" style="color:#374151">Nova Senha</label>
        <div class="input-group">
          <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock text-muted"></i></span>
          <input type="password" id="novaSenha" class="form-control border-start-0 ps-0"
            placeholder="••••••••" required minlength="6" autocomplete="new-password" />
          <button type="button" class="input-group-text bg-light" id="toggleNova">
            <i class="bi bi-eye text-muted" id="eyeNova"></i>
          </button>
        </div>
        <div class="password-strength bg-secondary opacity-25" id="strengthBar"></div>
        <small class="text-muted" id="strengthLabel" style="font-size:.75rem"></small>
      </div>

      <div class="mb-4">
        <label class="form-label fw-semibold" style="color:#374151">Confirmar Senha</label>
        <div class="input-group">
          <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock-fill text-muted"></i></span>
          <input type="password" id="confirmarSenha" class="form-control border-start-0 ps-0"
            placeholder="••••••••" required minlength="6" autocomplete="new-password" />
          <button type="button" class="input-group-text bg-light" id="toggleConfirmar">
            <i class="bi bi-eye text-muted" id="eyeConfirmar"></i>
          </button>
        </div>
      </div>

      <button type="submit" class="btn btn-primary-custom btn-primary w-100 text-white" id="btnSalvar">
        <span id="btnText"><i class="bi bi-check-circle me-2"></i>Salvar nova senha</span>
        <span id="btnSpinner" class="d-none">
          <span class="spinner-border spinner-border-sm me-2"></span>Salvando...
        </span>
      </button>
    </form>

    <div id="successMsg" class="d-none text-center mt-3">
      <a href="index.html" class="btn btn-outline-secondary w-100" style="border-radius:8px">
        <i class="bi bi-box-arrow-in-right me-2"></i>Ir para o Login
      </a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

    const supabase = createClient(
      'https://eyocvshcppjhaccvubzp.supabase.co',
      'sb_publishable_h4w2uJeHHSTUxqzBij97qQ_Md9dRdpB'
    );

    const alertBox = document.getElementById('alertBox');

    // Supabase envia o token via hash fragment (#access_token=...) ou query string
    // O SDK detecta automaticamente ao inicializar
    const { data: { session }, error: sessionError } = await supabase.auth.getSession();

    if (!session) {
      showAlert('Link inválido ou expirado. Solicite um novo link de redefinição.', 'danger');
      document.getElementById('resetForm').classList.add('d-none');
    }

    // Toggle visibilidade das senhas
    toggleEye('toggleNova', 'novaSenha', 'eyeNova');
    toggleEye('toggleConfirmar', 'confirmarSenha', 'eyeConfirmar');

    // Indicador de força da senha
    document.getElementById('novaSenha').addEventListener('input', function () {
      const val = this.value;
      const bar = document.getElementById('strengthBar');
      const label = document.getElementById('strengthLabel');
      const score = calcStrength(val);
      const configs = [
        { width: '0%',   color: 'secondary', text: '' },
        { width: '33%',  color: 'danger',    text: 'Fraca' },
        { width: '66%',  color: 'warning',   text: 'Média' },
        { width: '100%', color: 'success',   text: 'Forte' },
      ];
      const c = configs[score];
      bar.style.width = c.width;
      bar.className = `password-strength bg-${c.color}`;
      label.textContent = c.text;
    });

    // Enviar nova senha
    document.getElementById('resetForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      alertBox.classList.add('d-none');

      const nova = document.getElementById('novaSenha').value;
      const confirmar = document.getElementById('confirmarSenha').value;

      if (nova !== confirmar) {
        showAlert('As senhas não coincidem.', 'danger');
        return;
      }
      if (nova.length < 6) {
        showAlert('A senha deve ter pelo menos 6 caracteres.', 'danger');
        return;
      }

      setLoading(true);
      const { error } = await supabase.auth.updateUser({ password: nova });
      setLoading(false);

      if (error) {
        showAlert('Erro ao redefinir senha: ' + error.message, 'danger');
      } else {
        document.getElementById('resetForm').classList.add('d-none');
        document.getElementById('successMsg').classList.remove('d-none');
        showAlert('<i class="bi bi-check-circle me-2"></i>Senha redefinida com sucesso!', 'success');
        await supabase.auth.signOut();
      }
    });

    function toggleEye(btnId, inputId, iconId) {
      document.getElementById(btnId).addEventListener('click', () => {
        const input = document.getElementById(inputId);
        const icon = document.getElementById(iconId);
        if (input.type === 'password') {
          input.type = 'text';
          icon.className = 'bi bi-eye-slash text-muted';
        } else {
          input.type = 'password';
          icon.className = 'bi bi-eye text-muted';
        }
      });
    }

    function calcStrength(val) {
      if (!val) return 0;
      let score = 0;
      if (val.length >= 8) score++;
      if (/[A-Z]/.test(val) && /[a-z]/.test(val)) score++;
      if (/[0-9]/.test(val) && /[^A-Za-z0-9]/.test(val)) score++;
      return Math.min(score + 1, 3);
    }

    function showAlert(msg, type) {
      alertBox.className = `alert alert-${type}`;
      alertBox.innerHTML = msg;
      alertBox.classList.remove('d-none');
    }

    function setLoading(on) {
      document.getElementById('btnText').classList.toggle('d-none', on);
      document.getElementById('btnSpinner').classList.toggle('d-none', !on);
      document.getElementById('btnSalvar').disabled = on;
    }
  </script>
</body>
</html>
